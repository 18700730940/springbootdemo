#腾讯云短信
sms:
  tencent:
    secretId: AKIDQs65nGXN4GCuXtz93lL3VgkhCRjmhb4N
    secretKey: LSTKy1oVysruiStzzqSodEbhcZyCSTDi
    endpoint: sms.tencentcloudapi.com
    appid: 1400409882
    sign: 郝敏一工作信息
    templateID: 686278


    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      filters: stat,wall,log4j2,config
      max-active: 100
      initial-size: 1
      max-wait: 60000
      min-idle: 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: select 'x'
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-open-prepared-statements: 50
      max-pool-prepared-statement-per-connection-size: 20
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: '*.gif,*.png,*.jpg,*.html,*.js,*.css,*.ico,/druid/*'
      # Druid StatViewServlet配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: true
        login-username: admin
        login-password: admin
      # 配置日志输出
      filter:
        slf4j:
          enabled: true
          statement-create-after-log-enabled: false
          statement-close-after-log-enabled: false
          result-set-open-after-log-enabled: false
          result-set-close-after-log-enabled: false
      logging:
        config: classpath:log4j2.xml

  servlet:
    multipart:
      # 上传文件总的最大值
      max-request-size: 10MB
      max-file-size: 10MB

#mybatis配置信息
mybatis:
  mapper-locations: classpath:com/sir/springbootdemo/Mapping/*Mapper.xml
  type-aliases-package: com.sir.springbootdemo.beans.pojo

#是否开启swagger true开启 false关闭
swagger:
  enabled: true